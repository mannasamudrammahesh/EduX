<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)"/>
  
  <!-- Graduation cap -->
  <g transform="translate(50, 50)">
    <!-- Cap top -->
    <polygon points="-25,-10 0,-20 25,-10 0,0" fill="#ffffff"/>
    
    <!-- Cap base -->
    <rect x="-20" y="-10" width="40" height="8" rx="2" fill="#ffffff" opacity="0.9"/>
    
    <!-- Tassel -->
    <line x1="25" y1="-10" x2="30" y2="5" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <circle cx="30" cy="8" r="3" fill="#fbbf24"/>
    
    <!-- Book pages -->
    <rect x="-15" y="5" width="30" height="20" rx="2" fill="#ffffff" opacity="0.95"/>
    <line x1="-15" y1="10" x2="15" y2="10" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="-15" y1="15" x2="15" y2="15" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="-15" y1="20" x2="15" y2="20" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    
    <!-- Book spine -->
    <rect x="-1" y="5" width="2" height="20" fill="#8b5cf6" opacity="0.5"/>
  </g>
</svg>
